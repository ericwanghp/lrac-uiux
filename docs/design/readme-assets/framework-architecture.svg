<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arch-bg" x1="172" y1="62" x2="1216" y2="806" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF8F0"/>
      <stop offset="1" stop-color="#F3F6FA"/>
    </linearGradient>
    <filter id="arch-shadow" x="0" y="0" width="1400" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1400" height="860" rx="36" fill="url(#arch-bg)"/>
  <text x="92" y="106" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700">
    Framework Architecture
  </text>
  <text x="94" y="152" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="24">
    Session coordination and durable project memory operate as one system.
  </text>

  <g filter="url(#arch-shadow)">
    <rect x="84" y="204" width="812" height="264" rx="32" fill="#FCFDFE" stroke="#D7E2EE"/>
    <rect x="84" y="504" width="812" height="264" rx="32" fill="#FFFDF8" stroke="#E6DED0"/>
    <rect x="936" y="204" width="380" height="564" rx="32" fill="#0F172A"/>
  </g>

  <text x="122" y="250" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    SESSION LAYER
  </text>
  <text x="122" y="286" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Native Agent Teams
  </text>
  <text x="122" y="324" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <tspan x="122" dy="0">Short-term memory for live execution, task routing,</tspan>
    <tspan x="122" dy="26">and parallel collaboration.</tspan>
  </text>

  <rect x="124" y="364" width="170" height="70" rx="20" fill="#DBEAFE" stroke="#2563EB"/>
  <text x="157" y="407" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    TeamCreate
  </text>

  <rect x="316" y="364" width="170" height="70" rx="20" fill="#E7F7F2" stroke="#0F766E"/>
  <text x="352" y="407" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    TaskCreate
  </text>

  <rect x="508" y="364" width="170" height="70" rx="20" fill="#FEF3C7" stroke="#D97706"/>
  <text x="540" y="407" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    TaskUpdate
  </text>

  <rect x="700" y="364" width="146" height="70" rx="20" fill="#F1F5F9" stroke="#64748B"/>
  <text x="728" y="407" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    Messaging
  </text>

  <text x="122" y="550" fill="#D97706" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    PROJECT LAYER
  </text>
  <text x="122" y="586" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    File System + Git
  </text>
  <text x="122" y="622" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <tspan x="122" dy="0">Durable project memory that survives handoffs,</tspan>
    <tspan x="122" dy="26">interruptions, and long delivery cycles.</tspan>
  </text>

  <rect x="124" y="658" width="182" height="82" rx="22" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="159" y="694" fill="#C2410C" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    tasks.json
  </text>
  <text x="144" y="714" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="14">
    <tspan x="144" dy="0">Feature state,</tspan>
    <tspan x="144" dy="18">dependencies, status.</tspan>
  </text>

  <rect x="334" y="658" width="182" height="82" rx="22" fill="#F8FAFC" stroke="#64748B"/>
  <text x="363" y="694" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    progress.txt
  </text>
  <text x="357" y="712" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="13">
    <tspan x="354" dy="0">Session history and</tspan>
    <tspan x="354" dy="18">resume context.</tspan>
  </text>

  <rect x="544" y="658" width="168" height="82" rx="22" fill="#ECFDF5" stroke="#10B981"/>
  <text x="596" y="694" fill="#047857" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    docs/
  </text>
  <text x="562" y="710" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="12">
    <tspan x="562" dy="0">BRD, PRD, design,</tspan>
    <tspan x="562" dy="16">test, architecture.</tspan>
  </text>

  <rect x="740" y="658" width="106" height="82" rx="22" fill="#EDE9FE" stroke="#7C3AED"/>
  <text x="772" y="703" fill="#6D28D9" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    Git
  </text>

  <text x="972" y="250" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    GOVERNANCE
  </text>
  <text x="972" y="288" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">
    Rules + Process
  </text>
  <text x="972" y="328" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="972" dy="0">The framework keeps delivery structured</tspan>
    <tspan x="972" dy="24">instead of improvisational.</tspan>
  </text>

  <rect x="972" y="372" width="308" height="82" rx="22" fill="#111827" stroke="#334155"/>
  <text x="1004" y="408" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    8-phase development flow
  </text>
  <text x="1004" y="433" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">
    From BRD to UAT with explicit artifacts.
  </text>

  <rect x="972" y="474" width="308" height="82" rx="22" fill="#111827" stroke="#334155"/>
  <text x="1004" y="510" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    Completion checklist
  </text>
  <text x="1004" y="535" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">
    Update tasks, log progress, then commit.
  </text>

  <rect x="972" y="576" width="308" height="82" rx="22" fill="#111827" stroke="#334155"/>
  <text x="1004" y="612" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    Blockage handling
  </text>
  <text x="1004" y="637" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">
    Record blockers and preserve resume context.
  </text>

  <path d="M490 468V542" stroke="#64748B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M896 336H936" stroke="#64748B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M896 636H936" stroke="#64748B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="968" y="686" width="316" height="56" rx="16" fill="#1E293B"/>
  <text x="989" y="709" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="989" dy="0">Result: recoverable, parallel,</tspan>
    <tspan x="989" dy="20">auditable delivery.</tspan>
  </text>
</svg>
