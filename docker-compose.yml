version: "3.8"

services:
  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_ENABLE_WEBSOCKET=true
      - NEXT_PUBLIC_WS_URL=ws://localhost:3003
      - NEXT_PUBLIC_WS_PORT=3003
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped
    depends_on:
      - ws
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ws:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - WS_PORT=3003
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run ws:start
    restart: unless-stopped

  # Production build (uncomment for production)
  # app-production:
