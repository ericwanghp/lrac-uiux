name: Policy & Toolchain Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  policy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run toolchain dependency audit
        run: node .claude/scripts/audit-toolchain-deps.js

      - name: Run policy scan
        run: node .claude/scripts/policy-check.js --strict --sarif --sarif-output .claude/reports/policy.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-sarif
          path: .claude/reports/policy.sarif
          if-no-files-found: error

      - name: Publish SARIF
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .claude/reports/policy.sarif
